name: Update Repo Stats

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update star counts and repo status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');

            const repos = [
              'chenglou/pretext',
              'vladartym/always-fit-resume',
              'razroo/textura',
              'lucascrespo23/pinch-type',
              'tornikegomareli/swift-pretextkit',
              'BaselAshraf81/layout-sans',
              'fifteen42/pretext-video',
              '0xNyk/pretext-playground',
              'somnai-dreams/pretext-demos',
            ];

            for (const repo of repos) {
              try {
                const [owner, name] = repo.split('/');
                const { data } = await github.rest.repos.get({ owner, repo: name });
                const stars = data.stargazers_count.toLocaleString();
                // Update star count in table rows: | [name](url) | OLD_COUNT |
                const escapedName = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const pattern = new RegExp(
                  `(\\[${escapedName}\\]\\(https://github\\.com/${owner}/${escapedName}\\)\\s*\\|\\s*)([\\d,]+)`
                );
                readme = readme.replace(pattern, `$1${stars}`);
              } catch (e) {
                console.log(`Failed to fetch ${repo}: ${e.message}`);
              }
            }

            // Update the "last updated" timestamp
            const now = new Date().toISOString().split('T')[0];
            readme = readme.replace(
              /Last auto-updated: \d{4}-\d{2}-\d{2}/,
              `Last auto-updated: ${now}`
            );

            fs.writeFileSync('README.md', readme);

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress README.md
          fail: false

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update repo stats [automated]" && git push)
